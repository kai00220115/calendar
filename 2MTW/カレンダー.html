<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>個別日付カレンダー</title>
<style>
  body { font-family: Arial, sans-serif; }
  table { border-collapse: collapse; margin: 20px auto; }
  th, td {
    border: 1px solid #ccc;
    width: 40px; height: 40px;
    text-align: center;
  }
  th { background-color: #f0f0f0; }
  .event-day { background-color: #ffcccc; cursor: pointer; }
  .today { background-color: #ccffcc; }
</style>
</head>
<body>

<h2 style="text-align:center" id="monthYear"></h2>
<table id="calendar">
  <thead>
    <tr>
      <th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
// ===== 設定部分 =====
// 個別日付イベント（"YYYY-MM-DD": "イベント内容"）+-
//ko--ここを変更
const events = {
  "2026-06-25": "会議",
  "2026-06-28": "友人と食事",
  "2026-07-01": "プロジェクト開始"
};

// ===== カレンダー生成関数 =====
function generateCalendar(year, month) {
  const tbody = document.querySelector("#calendar tbody");
  tbody.innerHTML = ""; // 初期化

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const today = new Date();

  document.getElementById("monthYear").textContent =
    `${year}年 ${month + 1}月`;

  let row = document.createElement("tr");

  // 空白セル（1日が始まる曜日まで）
  for (let i = 0; i < firstDay.getDay(); i++) {
    row.appendChild(document.createElement("td"));
  }

  // 日付セル
  for (let date = 1; date <= lastDay.getDate(); date++) {
    const cell = document.createElement("td");
    const fullDate = `${year}-${String(month + 1).padStart(2, "0")}-${String(date).padStart(2, "0")}`;
    cell.textContent = date;

    // 今日の日付をハイライト
    if (date === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
      cell.classList.add("today");
    }

    // イベント日をハイライト
    if (events[fullDate]) {
      cell.classList.add("event-day");
      cell.title = events[fullDate];
      cell.addEventListener("click", () => {
        alert(`${fullDate} の予定: ${events[fullDate]}`);
      });
    }

    row.appendChild(cell);

    // 土曜日で改行
    if ((firstDay.getDay() + date) % 7 === 0) {
      tbody.appendChild(row);
      row = document.createElement("tr");
    }
  }

  // 最後の行を追加
  if (row.children.length > 0) {
    tbody.appendChild(row);
  }
}

// ===== 実行 =====
const now = new Date();
generateCalendar(now.getFullYear(), now.getMonth());
</script>

</body>
</html>
